name = "wildcard"
compatibility_date = "2026-07-01"
pages_build_output_dir = "."

# Stores completed orders written by functions/api/stripe-webhook.js, keyed
# as "order:<stripe_checkout_session_id>". Create the namespace with:
#   wrangler kv namespace create ORDERS
# then paste the resulting id below (and add a second entry with
# preview_id for `wrangler pages dev` / preview deployments).
[[kv_namespaces]]
binding = "ORDERS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Stores per product/size stock counts read/written by functions/_inventory.js,
# keyed as "inventory:<LABEL>-<SIZE>" (e.g. "inventory:RED-M"). Create the
# namespace with:
#   wrangler kv namespace create INVENTORY
# then paste the resulting id below. Until this is configured, inventory
# reads fall back to the seed numbers in _inventory.js's DEFAULT_STOCK and
# writes (stock decrements on paid orders) silently no-op — see
# functions/README.md for details.
[[kv_namespaces]]
binding = "INVENTORY"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Backs the admin dashboard's auth: per-IP failed-login rate limiting
# (functions/_auth.js's checkRateLimit/recordFailedAttempt) and the
# logout/session-revocation denylist (revokeSession/isSessionRevoked).
# Create it the same way as the others:
#   wrangler kv namespace create ADMIN_AUTH
# Until this is configured, login still requires the correct password —
# it just isn't rate-limited, and logout only clears the cookie client-side
# instead of also invalidating it server-side. See functions/README.md.
[[kv_namespaces]]
binding = "ADMIN_AUTH"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
